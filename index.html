<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zipa Electronics | Tecnología y Componentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Cargando Zipa Electronics...</p>
    </div>

    <header>
        <img src="logo-zipa.png.jpg" alt="Logo Zipa Electronics" class="logo">
        <nav>
            <ul class="menu">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#nuestros-productos">Productos</a></li>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#seccion-contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="inicio" class="hero">
            <h1>Bienvenidos a Zipa Electronics</h1>
            <a href="#seccion-contacto" class="boton-contacto">Contactar asesor</a>
        </section>

        <section class="ofertas-mes">
            <div class="oferta-banner">
                <h2>¡Súper Combo de Inicio!</h2>
                <div class="contador" id="countdown">
                    <div><span id="days">00</span><small>Días</small></div>
                    <div><span id="hours">00</span><small>Horas</small></div>
                    <div><span id="minutes">00</span><small>Min</small></div>
                    <div><span id="seconds">00</span><small>Seg</small></div>
                </div>
                <a href="https://wa.me/573017723021" class="boton-oferta">Reclamar Oferta</a>
            </div>
        </section>

        <section id="seccion-contacto" class="contacto-seccion">
            <div class="contacto-flex">
                <form id="contact-form" action="https://formspree.io/f/mjgeyqoj" method="POST" class="formulario">
                    <input type="text" name="nombre" placeholder="Nombre Completo" required>
                    <input type="email" name="email" placeholder="Correo Electrónico" required>
                    <textarea name="mensaje" placeholder="¿En qué podemos ayudarte?" rows="5" required></textarea>
                    <button type="submit" class="boton-enviar">Enviar Mensaje</button>
                    <div id="form-status"></div>
                </form>
                <div class="mapa">
                    <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>
    </main>

    <a href="https://wa.me/573017723021" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
